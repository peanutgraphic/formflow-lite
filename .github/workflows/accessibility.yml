name: Accessibility

on:
  pull_request:
    branches:
      - main

jobs:
  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint with jsx-a11y
        continue-on-error: true
        run: |
          npx eslint --ext .js,.jsx,.ts,.tsx src/ \
            --rule 'jsx-a11y/alt-text: warn' \
            --rule 'jsx-a11y/anchor-has-content: warn' \
            --rule 'jsx-a11y/aria-props: error' \
            --rule 'jsx-a11y/aria-role: error' \
            --rule 'jsx-a11y/role-has-required-aria-props: error' \
            --rule 'jsx-a11y/label-has-associated-control: error' \
            --rule 'jsx-a11y/click-events-have-key-events: warn' \
            --rule 'jsx-a11y/no-static-element-interactions: warn'

      - name: Run accessibility tests
        run: npx vitest run --reporter=verbose -- a11y

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-test-results
          path: coverage/
          retention-days: 30
